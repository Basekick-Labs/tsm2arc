name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release + upload assets
  packages: write # push the container image to GHCR
  id-token: write # for keyless signing / provenance if added later

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up QEMU (multi-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM generator used by GoReleaser)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run tests before releasing
        run: go test -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM for the container image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/basekick-labs/tsm2arc:${{ github.ref_name }}
          format: spdx-json
          output-file: tsm2arc-image-${{ github.ref_name }}.sbom.spdx.json

      - name: Attach image SBOM to the release
        uses: softprops/action-gh-release@v2
        with:
          files: tsm2arc-image-${{ github.ref_name }}.sbom.spdx.json
